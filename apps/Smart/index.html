<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- Prevent iOS Safari from auto-linking phone numbers, dates, addresses
         (critical for POS: $1,500.00 was being turned into a tel: link) -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Archilla OS" />
    <!-- Apple Touch Icons (home screen shortcut en iPhone/iPad) -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <!-- Android / PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Bricolage Grotesque for the wordmark/hero -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" />
    <title>Archilla OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        try {
          if (window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
            window.__SFOS_AUTH_HASH = window.location.hash;
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Force clear stale SW caches on load — sfos-v5
      (function(){
        var CURRENT = 'sfos-v5';
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              if (name.indexOf('sfos-') === 0 && name !== CURRENT + '-precache' && name.indexOf(CURRENT) === -1) {
                caches.delete(name);
              }
            });
          });
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.update(); });
          });
        }

        // iOS Safari portrait viewport fix — recalculo forzado tras carga
        function fixViewport() {
          document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        }
        fixViewport();
        window.addEventListener('resize', fixViewport);
        window.addEventListener('orientationchange', fixViewport);
        // Trigger layout recalc after initial paint (fixes iOS Safari portrait bug)
        if ('requestAnimationFrame' in window) {
          requestAnimationFrame(function() {
            requestAnimationFrame(fixViewport);
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
