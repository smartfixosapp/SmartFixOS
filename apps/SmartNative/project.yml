name: SmartNative
options:
  bundleIdPrefix: com.smartfixos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  developmentLanguage: es
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    majorVersion: 2

targets:
  SmartNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SmartNative
        excludes:
          - "**/*.md"
    resources:
      - path: SmartNative/Resources/Assets.xcassets
      - path: SmartNative/Resources/Info.plist
        buildPhase: none
    info:
      path: SmartNative/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartfixos.native
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: SmartNative/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Supabase
        product: Supabase
    scheme:
      testTargets: []
